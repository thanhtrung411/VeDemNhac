<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soát Vé QR - GitHub Edition</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f7f9; }
    #reader { width: 100%; max-width: 400px; margin: 0 auto; border-radius: 10px; overflow: hidden; background: white; }
    .result { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .success { border-left: 5px solid #28a745; color: #28a745; }
    .error { border-left: 5px solid #dc3545; color: #dc3545; }
    #loading { display: none; color: #007bff; font-weight: bold; margin: 10px; }
  </style>
</head>
<body>
  <h2>🎫 HỆ THỐNG SOÁT VÉ 2026</h2>
  <div id="reader"></div>
  <div id="loading">⌛ ĐANG KIỂM TRA...</div>
  
  <div id="result-box" class="result">
    <h3 id="status-text"></h3>
    <p id="info-text"></p>
    <button onclick="restartScanner()" style="padding: 10px 20px;">QUÉT TIẾP</button>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxXyJojrfAhPWOgmlr0xF95WEE3hZK4U8gAFv1ku0G01YStBkhiz0etGVsStkUXlKLd/exec";
    let html5QrCode;

    function startScanner() {
      html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start(
        { facingMode: "environment" }, 
        { fps: 10, qrbox: 250 },
        onScanSuccess
      );
    }

    async function onScanSuccess(decodedText) {
      await html5QrCode.stop();
      document.getElementById('loading').style.display = 'block';
      document.getElementById('result-box').style.display = 'none';

      try {
        // Gọi API đến GAS
        const response = await fetch(`${GAS_URL}?maVe=${encodeURIComponent(decodedText)}`);
        const data = await response.json();
        showResult(data);
      } catch (err) {
        alert("Lỗi kết nối: " + err);
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    function showResult(res) {
      const box = document.getElementById('result-box');
      const status = document.getElementById('status-text');
      const info = document.getElementById('info-text');

      box.style.display = "block";
      box.className = "result " + (res.success ? "success" : "error");
      status.innerText = res.message;
      
      if (res.info) {
        info.innerHTML = `Khách hàng: <b>${res.info.ten}</b><br>Mã vé: ${res.info.ma || '---'}`;
      } else {
        info.innerText = "";
      }
    }

    function restartScanner() {
      document.getElementById('result-box').style.display = 'none';
      startScanner();
    }

    window.onload = startScanner;
  </script>
</body>
</html>
