<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soát Vé QR Pro</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --success: #28a745; --error: #dc3545; --primary: #007bff; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; padding: 15px; background: #f4f7f9; margin: 0; }
    
    /* Khung quét */
    #reader { width: 100%; max-width: 450px; margin: 0 auto; border-radius: 15px; overflow: hidden; background: #000; box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
    
    /* Điều khiển Camera */
    .controls { margin: 15px auto; max-width: 400px; }
    select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; appearance: none; background: white url('data:image/svg+xml;charset=US-ASCII,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="grey" d="M7 10l5 5 5-5z"/></svg>') no-repeat right 10px center; }

    /* Hiệu ứng Loading xoay tròn */
    #loading { display: none; margin: 20px auto; width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Thẻ kết quả */
    .result-card { margin: 20px auto; padding: 20px; border-radius: 15px; background: white; box-shadow: 0 5px 20px rgba(0,0,0,0.1); display: none; text-align: left; max-width: 400px; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    
    .status-title { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 15px; text-transform: uppercase; }
    .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #eee; }
    .info-label { color: #888; }
    .info-val { font-weight: 600; color: #222; }

    .btn-next { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; margin-top: 15px; cursor: pointer; transition: 0.2s; }
    .btn-next:active { transform: scale(0.98); opacity: 0.9; }
  </style>
</head>
<body>

  <h2 style="color: var(--primary);">🎫 SOÁT VÉ QR 2026</h2>

  <div class="controls">
    <select id="camera-select"><option value="">Đang tải camera...</option></select>
  </div>

  <div id="reader"></div>
  <div id="loading"></div>
  
  <div id="result-box" class="result-card">
    <div id="status-msg" class="status-title"></div>
    <div id="info-content"></div>
    <button class="btn-next" onclick="restartScanner()">QUÉT TIẾP</button>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbx0ZUagUWJ-3N_Zi_nbDdd6gFpK27h6A90fXi1eJrfN5DQ_O_ZKAUpDC8uM34QTEltk/exec";
    let html5QrCode;
    const cameraSelect = document.getElementById('camera-select');

    async function initCamera() {
      try {
        const devices = await Html5Qrcode.getCameras();
        if (devices && devices.length) {
          cameraSelect.innerHTML = "";
          devices.forEach(device => {
            const option = document.createElement('option');
            option.value = device.id;
            option.text = device.label || `Camera ${cameraSelect.length + 1}`;
            cameraSelect.appendChild(option);
          });
          const saved = localStorage.getItem('selectedCameraId');
          if (saved && devices.some(d => d.id === saved)) cameraSelect.value = saved;
          startScanner(cameraSelect.value);
        }
      } catch (err) { alert("Lỗi camera: " + err); }
    }

    function startScanner(cameraId) {
      if (html5QrCode) html5QrCode.clear();
      html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start(cameraId, { fps: 15, qrbox: 250 }, onScanSuccess);
    }

    async function onScanSuccess(decodedText) {
      // 1. Rung máy báo hiệu đã nhận mã (Chỉ chạy trên Android)
      if (navigator.vibrate) navigator.vibrate(100);
      
      // 2. Dừng camera ngay để xử lý
      await html5QrCode.stop();
      document.getElementById('loading').style.display = 'block';
      document.getElementById('result-box').style.display = 'none';

      try {
        // 3. Gọi API song song
        const response = await fetch(`${GAS_URL}?maVe=${encodeURIComponent(decodedText)}`);
        const data = await response.json();
        showResult(data);
      } catch (err) {
        alert("Lỗi kết nối: " + err);
        restartScanner();
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    function showResult(res) {
      const box = document.getElementById('result-box');
      const status = document.getElementById('status-msg');
      const info = document.getElementById('info-content');

      box.style.display = "block";
      status.innerText = res.message;
      status.style.color = res.success ? "var(--success)" : "var(--error)";
      box.style.borderTop = `8px solid ${res.success ? 'var(--success)' : 'var(--error)'}`;
      
      // Fix lỗi undefined: Luôn hiển thị info nếu server trả về
      if (res.info) {
        info.innerHTML = `
          <div class="info-row"><span class="info-label">Khách:</span><span class="info-val">${res.info.ten}</span></div>
          <div class="info-row"><span class="info-label">Mã vé:</span><span class="info-val" style="color:var(--primary)">${res.info.ma}</span></div>
          <div class="info-row"><span class="info-label">SĐT:</span><span class="info-val">${res.info.sdt}</span></div>
        `;
      } else {
        info.innerHTML = "<p style='text-align:center; color:#999;'>Không có dữ liệu chi tiết</p>";
      }
    }

    function restartScanner() {
      document.getElementById('result-box').style.display = 'none';
      startScanner(cameraSelect.value);
    }

    cameraSelect.addEventListener('change', () => {
      localStorage.setItem('selectedCameraId', cameraSelect.value);
      startScanner(cameraSelect.value);
    });

    window.onload = initCamera;
  </script>
</body>
</html>
